
<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8"><title>Meus Pets</title></head>
<body>
  <h1>Meus Pets</h1>
  <a href="{% url 'pet_create' %}">Cadastrar novo</a>
  <ul>
    {% for p in pets %}<li>{{ p.nome }} — {{ p.get_especie_display }} — {{ p.raca }} ({{ p.data_nascimento|date:"d/m/Y" }})</li>{% empty %}<li>Nenhum pet cadastrado.</li>{% endfor %}
  </ul>
</body></html>
