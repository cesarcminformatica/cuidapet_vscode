
<!DOCTYPE html><html lang="pt-br"><head><meta charset="utf-8"><title>Buscar Cuidadores</title></head>
<body>
  <h1>Buscar Cuidadores</h1>
  <form method="get">
    <input type="text" name="q" value="{{ q }}" placeholder="Pesquisar por nome/descrição" />
    <input type="text" name="cidade" value="{{ cidade }}" placeholder="Cidade" />
    <select name="uf"><option value="">UF</option>{% for sigla, nome in cuidadores.model.UF.choices %}<option value="{{ sigla }}" {% if uf == sigla %}selected{% endif %}>{{ sigla }}</option>{% endfor %}</select>
    <select name="pet"><option value="">Selecione um pet (opcional)</option>{% for p in pets %}<option value="{{ p.id }}" {% if pet_id|default:'' == p.id|stringformat:'s' %}selected{% endif %}>{{ p.nome }} — {{ p.get_especie_display }}</option>{% endfor %}</select>
    <label>Início: <input type="datetime-local" name="data_inicio" value="{{ data_inicio }}"></label>
    <label>Fim: <input type="datetime-local" name="data_fim" value="{{ data_fim }}"></label>
    <button type="submit">Buscar</button>
  </form>

  <h2>Resultados</h2>
  <table border="1" cellpadding="6">
    <thead>
      <tr><th>Nome</th><th>Descrição</th><th>Valor/diária</th><th>Cidade/UF</th><th>Ação</th></tr>
    </thead>
    <tbody>
      {% for c in cuidadores %}
        <tr>
          <td>{{ c.usuario.first_name }}</td>
          <td>{{ c.descricao }}</td>
          <td>R$ {{ c.valor_diaria }}</td>
          <td>{{ c.cidade }}/{{ c.uf }}</td>
          <td><a href="{% url 'agendamento_criar' c.id %}">Agendar</a></td>
        </tr>
      {% empty %}
        <tr><td colspan="5">Nenhum cuidador encontrado.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</body></html>
